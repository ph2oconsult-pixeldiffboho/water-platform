# ─────────────────────────────────────────────────────────────────────────────
# WASTEWATER DOMAIN DEFAULTS
# Wastewater-specific assumptions merged with shared_defaults.yaml.
# Domain values take precedence over shared values where keys overlap.
# ─────────────────────────────────────────────────────────────────────────────

cost_assumptions:
  # Wastewater-specific capex unit costs
  capex_unit_costs:
    # Activated sludge / BNR
    aeration_tank_per_m3: 950.0          # $/m³ concrete aeration tank
    secondary_clarifier_per_m2: 3800.0   # $/m² surface area installed
    return_sludge_pump_per_ls: 2200.0    # $/L/s RAS pump set

    # MBR
    mbr_membrane_per_m2: 95.0            # $/m² membrane installed (hollow fibre)
    mbr_membrane_flat_sheet_per_m2: 110.0

    # Fine screening (MBR pre-treatment)
    fine_screen_per_unit: 85000.0        # $/unit (1–5 MLD)

    # Sludge handling
    gravity_thickener_per_m2: 2800.0     # $/m² surface area
    belt_thickener_per_m2_belt: 180000.0 # $/unit (1 m belt width)
    centrifuge_per_unit: 420000.0        # $/unit (medium, 20–40 kg DS/hr)

    # Sidestream
    struvite_reactor_per_kgp_day: 8500.0 # $/kg P/day capacity

    # IFAS/MBBR carrier media
    ifas_media_per_m2: 45.0              # $/m² protected surface area installed

    # AD + CHP
    digester_per_m3: 1800.0             # $/m³ digester volume (mesophilic CSTR)
    digester_instrumentation_per_m3: 250.0
    gas_handling_per_m3_biogas_day: 1200.0  # $/m³ CH4/day (pipes, flare, compressor)
    chp_per_kw_installed: 1800.0        # $/kW electrical installed (gas engine)
    biogas_chp_per_kw: 1800.0           # $/kW (alias used by AnMBR module)
    sludge_handling_per_kgds_day: 850.0 # $/kgDS/day (heat exchanger, pumps)

    # Advanced reuse (UF+RO+UV/AOP)
    uf_membrane_per_m2: 35.0            # $/m² UF installed
    ro_membrane_per_m2: 55.0            # $/m² RO installed
    uv_per_kw_installed: 2200.0         # $/kW UV/AOP installed

    # Thermal biosolids (drying + incineration or pyrolysis)
    thermal_biosolids_incineration_per_kwh_thermal: 180.0  # $/kWth installed
    thermal_recovery_per_kw_electrical: 2400.0             # $/kWe recovery system
    scrubber_per_kwh_thermal: 45.0                         # $/kWth flue gas cleaning
    biosolids_feed_handling_per_t_ds_yr: 380.0             # $/t DS/yr feed system

    # Mobile Organic Biofilm (MOB)
    mob_carrier_per_m3_reactor: 650.0   # $/m³ reactor volume (media + retention)
    fine_bubble_diffuser_upgrade_per_m3: 120.0  # $/m³ aerobic volume

    # Chemical P removal (CPR)
    coagulant_dosing_per_kgday: 850.0   # $/kg P/day dosing capacity
    lamella_per_m2: 2200.0              # $/m² lamella clarifier

    # Tertiary filtration
    rsf_per_m2_filter: 3800.0           # $/m² filter area (rapid sand filter)

    # Sidestream PN/A (Anammox)
    scada_per_m3_reactor: 350.0         # $/m³ reactor (specialised SCADA for Anammox)

  opex_unit_rates:
    # Membrane replacement (annualised)
    mbr_membrane_replacement_per_m2_yr: 8.50   # $/m²/yr (10yr life)
    mbr_membrane_flat_sheet_replacement_per_m2_yr: 10.00

    electricity_per_kwh: 0.14                  # $/kWh (inherited from shared, restated)

    # Maintenance and labour — applied by domain_interface to all scenarios
    # Maintenance: 1.5% of CAPEX/yr (WEF Cost Estimating Manual 2018)
    # Labour: 0.8 FTE per 10 MLD average flow (AU wages fully loaded)
    # maintenance_pct_of_capex_annual: not set — costing engine uses tech-specific defaults
    labour_fte_per_10mld: 2.5                  # FTE per 10 MLD (operators + maintenance technicians, AU benchmark)
    labour_cost_per_fte: 105000.0              # AUD/yr fully loaded (2024)

    # Sludge disposal — used by ALL biological treatment modules
    # Alias for shared_defaults.biosolids_disposal_per_tonne_ds
    sludge_disposal_per_tds: 280.0             # $/t DS (dewatered cake to land/landfill)

    # IFAS/MBBR carrier media replacement (~5%/yr of installed cost)
    ifas_media_per_m2: 2.25                    # $/m²/day ≈ $45/m²/yr × 5% / 365

    # AD+CHP maintenance
    digestion_maintenance_per_kgds_day: 15.0   # $/kgDS/day capacity/yr annualised to $/day

    # Advanced reuse OPEX
    membrane_chemical_per_m3_product: 0.08     # $/m³ product (RO/UF cleaning chemicals)
    ro_membrane_replacement_per_m2_yr: 12.0    # $/m²/yr RO membrane replacement

    # Thermal biosolids
    natural_gas_per_kwh: 0.04                  # $/kWh thermal (if supplemental gas needed)
    thermal_maintenance_per_t_ds_yr: 85.0      # $/t DS/yr thermal plant O&M
    ash_disposal_per_tonne: 120.0              # $/t dry ash to landfill

    # Mobile Organic Biofilm (MOB) carrier media
    mob_carrier_per_kg: 8.50                   # $/kg/yr carrier media attrition

  # Wastewater-specific chemicals
  chemical_prices:
    methanol_per_kg: 0.65                # $/kg (carbon source for denitrification)
    alum_per_kg: 0.55                    # $/kg (phosphorus precipitation)
    ferric_chloride_per_kg: 0.72         # $/kg
    polymer_per_kg: 4.20                 # $/kg (sludge dewatering)
    sodium_hypochlorite_per_kg: 1.20     # $/kg (effluent disinfection)

carbon_assumptions:
  # Wastewater-specific process emissions
  n2o_emission_factor_g_n2o_per_g_n_removed: 0.016   # IPCC default for BNR
  n2o_gwp: 298                                         # Global warming potential
  ch4_emission_factor_g_ch4_per_g_bod_influent: 0.0025 # Fugitive CH4 from biological treatment
  ch4_gwp: 28

engineering_assumptions:
  # Activated sludge / BNR kinetics
  influent_bod_mg_l: 250
  influent_tss_mg_l: 280
  influent_tn_mg_l: 45
  influent_tp_mg_l: 7.0
  effluent_bod_mg_l: 10.0
  effluent_tss_mg_l: 10.0
  effluent_tn_mg_l: 10.0
  effluent_tp_mg_l: 0.5

  # Sludge yield
  activated_sludge_observed_yield: 0.38    # kgVSS/kgBOD (aerobic, ~10d SRT)
  mbr_observed_yield: 0.25                 # kgVSS/kgBOD (MBR, ~15d SRT)
  vss_to_tss_ratio: 0.80

  # Aeration
  alpha_factor: 0.55                       # Process water / clean water O2 transfer
  beta_factor: 0.95
  theta_factor: 1.024                      # Temperature correction base
  standard_aeration_efficiency_kg_o2_kwh: 1.8  # kg O2/kWh (fine bubble)
  oxygen_demand_factor_kg_o2_per_kg_bod: 1.5   # Simplified BOD oxidation demand

  # BNR
  denitrification_rate_kg_no3_kg_bod: 0.12     # kg NO3-N removed / kg BOD applied
  methanol_dose_kg_per_kg_tn_removed: 4.0      # Supplemental carbon for denitrifcation

  # MBR
  mbr_net_to_gross_factor: 0.90
  mbr_sad: 0.30                            # Specific aeration demand m³/m²/h
  mbr_tmp_kpa: -25.0                       # Transmembrane pressure (suction)
  mbr_blower_sae: 1.80                     # Standard aeration efficiency kg O2/kWh
  mbr_cip_interval_days: 30
  mbr_packing_density: 150                 # m² membrane per m³ tank volume

  # Granular sludge (DEMON / Nereda)
  granular_sludge_sv30_ml_l: 50            # Typical settled volume 30min
  granular_sludge_srt_days: 20

  # IFAS media fill ratio: 0 to 1
  ifas_media_fill_ratio: 0.35
  ifas_media_surface_area_m2_per_m3: 500

  # Sidestream: sludge recycle TN loading
  sidestream_tn_fraction_of_influent: 0.25   # Fraction of plant TN load in reject water
